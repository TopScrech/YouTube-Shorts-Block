<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
    <script type="module" src="popup.js"></script>
</head>
<body>
    <main class="popup">
        <h1 class="title">Shorts Block</h1>
        <label class="toggle" for="enabled-toggle">
            <span class="toggle-label">Block Shorts</span>
            <span class="toggle-control">
                <input id="enabled-toggle" type="checkbox" checked>
                <span class="toggle-track" aria-hidden="true"></span>
                <span class="toggle-thumb" aria-hidden="true"></span>
            </span>
        </label>
        <label class="toggle" for="playlist-toggle">
            <span class="toggle-label">Return to playlist button</span>
            <span class="toggle-control">
                <input id="playlist-toggle" type="checkbox" checked>
                <span class="toggle-track" aria-hidden="true"></span>
                <span class="toggle-thumb" aria-hidden="true"></span>
            </span>
        </label>
        <label class="toggle" for="likes-toggle">
            <span class="toggle-label">Hide likes/dislikes</span>
            <span class="toggle-control">
                <input id="likes-toggle" type="checkbox">
                <span class="toggle-track" aria-hidden="true"></span>
                <span class="toggle-thumb" aria-hidden="true"></span>
            </span>
        </label>
        <label class="toggle" for="like-count-toggle">
            <span class="toggle-label">Hide like count</span>
            <span class="toggle-control">
                <input id="like-count-toggle" type="checkbox">
                <span class="toggle-track" aria-hidden="true"></span>
                <span class="toggle-thumb" aria-hidden="true"></span>
            </span>
        </label>
        <label class="toggle" for="comments-toggle">
            <span class="toggle-label">Hide comments</span>
            <span class="toggle-control">
                <input id="comments-toggle" type="checkbox">
                <span class="toggle-track" aria-hidden="true"></span>
                <span class="toggle-thumb" aria-hidden="true"></span>
            </span>
        </label>
    </main>
</body>
</html>
